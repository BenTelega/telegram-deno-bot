version: '3.8'
services:
  deno-bot:
    image: denoland/deno:alpine-2.7.11
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBHOOK_URL=https://tgbot.benetelega.ru
      - PORT=3000
    command: ["run", "--allow-net", "--allow-env", "--allow-read", "/app/main.ts"]
    working_dir: /app
    volumes:
      - .:/app
    restart: unless-stopped
