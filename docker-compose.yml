version: '3.8'
services:
  deno-bot:
    build: .
    ports:
      - "0.0.0.0:3000:3000"  # ← Порт для Caddy
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - WEBHOOK_URL=https://tgbot.benetelega.ru  # ← Публичный URL!
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "deno", "eval", "await fetch('http://localhost:3000')"]
      interval: 30s
      timeout: 10s
      retries: 3
